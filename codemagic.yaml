# Codemagic CI pipeline for PetTrack.
#
# See README_CODEMAGIC.md for step-by-step setup instructions (how to connect the
# repo, how to generate App Store Connect API keys, how to redeem TestFlight builds).
#
# Xcode 16.2 on Codemagic's managed runners. Apple requires Xcode 16+ for App Store
# submissions since April 2025, and Codemagic has dropped the 15.x pool. This matches
# Nicolás's local Sequoia + Xcode 16 combo, BUT Codemagic's runners do not exhibit the
# com.apple.provenance xattr codesign bug in practice — likely a cleaner/fresher file
# environment (git clone, no DMG-origin xattrs, no accumulated provenance tags on the
# Flutter SDK cache). If the bug ever does appear on Codemagic, the SEQUOIA_XATTR_FIX.md
# patches (Podfile post_install, xcode project xattr strip phases, Flutter SDK patch)
# would need to be ported into an early CI step here.
#
# No `triggering:` sections yet — all builds are manual. Wire up branch triggers
# once the pipeline has produced at least one green TestFlight build.

workflows:

  # -----------------------------------------------------------------------
  # ios-simulator-debug
  #
  # Moment-of-truth sanity check. No Apple Developer credentials required.
  # Builds the app for iOS Simulator with codesigning disabled. If this passes,
  # the Flutter code + CocoaPods setup is clean on Codemagic and we can move on
  # to the signed TestFlight workflow below.
  # -----------------------------------------------------------------------
  ios-simulator-debug:
    name: iOS Simulator Debug
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      flutter: 3.41.3
      xcode: 16.2
      cocoapods: default
    scripts:
      - name: Flutter pub get
        script: |
          flutter pub get
      - name: Pod install
        script: |
          cd ios && pod install
      - name: Build iOS app for simulator (no signing)
        script: |
          flutter build ios --debug --simulator --no-codesign
    artifacts:
      - build/ios/iphonesimulator/Runner.app
      - flutter_drive.log

  # -----------------------------------------------------------------------
  # ios-testflight
  #
  # Signed Release IPA, uploaded to TestFlight. Requires one-time setup in
  # the Codemagic UI — see README_CODEMAGIC.md section "App Store Connect API key"
  # before running this workflow for the first time.
  # -----------------------------------------------------------------------
  ios-testflight:
    name: iOS TestFlight
    max_build_duration: 120
    instance_type: mac_mini_m2
    integrations:
      # Name of the integration you configured in Codemagic UI:
      # Team settings -> Integrations -> App Store Connect -> "codemagic"
      app_store_connect: codemagic
    environment:
      flutter: 3.41.3
      xcode: 16.2
      cocoapods: default
      ios_signing:
        distribution_type: app_store
        # Bundle ID matches ios/Runner.xcodeproj/project.pbxproj
        bundle_identifier: co.pettrack.pettrackApp
      # NOTE: APP_STORE_APPLE_ID is set in the Codemagic UI (dashboard → app →
      # Environment variables), NOT in this file. See README_CODEMAGIC.md § 3.4.
      # Until it's set, the build script below falls through to $BUILD_NUMBER.
    scripts:
      - name: Set up code signing settings on Xcode project
        script: |
          xcode-project use-profiles
      - name: Flutter pub get
        script: |
          flutter pub get
      - name: Pod install
        script: |
          cd ios && pod install
      - name: Build signed IPA
        script: |
          # Auto-increment build number from the latest TestFlight build, if we have
          # APP_STORE_APPLE_ID set. Otherwise use Codemagic's build counter ($BUILD_NUMBER).
          if [ -n "$APP_STORE_APPLE_ID" ]; then
            BUILD_NUM=$(($(app-store-connect get-latest-app-store-build-number "$APP_STORE_APPLE_ID") + 1))
          else
            BUILD_NUM="$BUILD_NUMBER"
          fi
          flutter build ipa --release \
            --build-name=1.0.0 \
            --build-number="$BUILD_NUM" \
            --export-options-plist=/Users/builder/export_options.plist
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - flutter_drive.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        # Add beta_groups here once you've created internal/external tester groups
        # in App Store Connect. Leave commented until then — uploading to TestFlight
        # without a group is fine; you just have to invite testers manually.
        # beta_groups:
        #   - Internal
        submit_to_app_store: false

