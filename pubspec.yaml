name: pettrack_app
description: "PetTrack - Pet GPS Tracking for Colombia"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  
  # Firebase
  firebase_core: ^3.10.0
  firebase_auth: ^5.3.4
  firebase_storage: ^12.3.8
  firebase_messaging: ^15.1.7
  cloud_firestore: ^5.6.0
  
  # Google Maps
  google_maps_flutter: ^2.10.0
  location: ^7.0.0
  geocoding: ^3.0.0
  
  # State Management
  provider: ^6.1.2
  
  # HTTP & WebSocket
  http: ^1.2.2
  web_socket_channel: ^3.0.1
  
  # QR Code
  mobile_scanner: ^7.2.0
  
  # Image Picker
  image_picker: ^1.1.2
  
  # UI Components
  cupertino_icons: ^1.0.8
  intl: ^0.20.1
  flutter_svg: ^2.0.14
  
  # Utils
  shared_preferences: ^2.3.4
  path_provider: ^2.1.5
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
